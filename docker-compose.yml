services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    ports:
      - "3306:3306"
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/docker/initdb:/docker-entrypoint-initdb.dir:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      # Sieciowy URL wskazujący na kontener bazy danych 'mysql'
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/$${MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

      # Przekazujemy hasło z pliku .env bezpośrednio do zmiennej oczekiwanej przez properties
      DB_PASSWORD: $${MYSQL_PASSWORD}

      # Ukrywamy sekret JWT przed Sonarem (możesz go też zdefiniować w pliku .env jako JWT_SECRET)
      JWT_SECRET: "mojaMegaBezpiecznaTajnaSekretnaFrazaDoJwtTokenow1234567890ABCDEF!BartSommer"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/PASJava-FrontEnd
    restart: unless-stopped
    ports:
      - "5174:8080"
    depends_on:
      - backend

volumes:
  mysql_data: