spring.application.name=PASiR_Sommer_Bartosz

# MySQL Configuration - Zmieniono z 127.0.0.1:3307 na nazwę kontenera 'mysql:3306'
spring.datasource.url=jdbc:mysql://mysql:3306/sommer_bartosz_gi_spring?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=user-bs

# NAPRAWA SONARA: Hasło pobierane dynamicznie ze zmiennej środowiskowej (z zapasowym hasłem domyślnym)
spring.datasource.password=${DB_PASSWORD:Maciej27!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# GraphQL
spring.graphql.http.path=/graphql
spring.graphql.schema.file-extensions=.graphql,.graphqls,.gqls

# NAPRAWA SONARA: Zmiana nazwy na standardową dla Springa i ukrycie sekretu w zmiennej środowiskowej
jwt.secret=${JWT_SECRET:mojaMegaBezpiecznaTajnaSekretnaFrazaDoJwtTokenow1234567890ABCDEF!BartSommer}